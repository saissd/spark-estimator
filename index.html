<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="Spark Homes field repair-cost estimator." />
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Estimator" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Spark Homes · Repair Estimator</title>
</head>
<body>

  <!-- Branded launch splash (removed by app.js once the first screen is ready) -->
  <div id="splash" class="splash">
    <div class="splash__mark"><img src="icons/icon-192.png" alt="Spark Homes" /></div>
    <div class="splash__name">SPARK HOMES</div>
    <div class="splash__sub">Repair Estimator</div>
  </div>

  <!-- Project drawer (kept outside #app so re-renders never clobber it) -->
  <div id="overlay" class="overlay"></div>
  <aside id="drawer" class="drawer">
    <div class="drawer__head">
      <h2>Projects</h2>
      <button class="iconbtn" data-action="close-drawer" aria-label="Close">✕</button>
    </div>
    <div id="drawer-list" class="drawer__list"></div>
    <div class="drawer__foot">
      <button id="install-btn" class="btn btn--ghost hidden" data-action="install-app" style="width:100%;margin-bottom:10px">📲 Install app</button>
      <button class="btn btn--primary" data-action="new-project" style="width:100%">+ New Project</button>
    </div>
  </aside>

  <!-- Bottom sheet host (rename, price edit, add item, add room, etc.) -->
  <div id="sheet-wrap" class="sheet-wrap">
    <div class="sheet-bg" data-action="close-sheet"></div>
    <div id="sheet" class="sheet"></div>
  </div>

  <!-- Hidden file input drives the device camera for photo capture -->
  <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" />

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Main app root -->
  <div id="app"></div>

  <!-- Vendored libraries (cached by the service worker → offline-safe) -->
  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>
  <!-- App code -->
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/export.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed', err));
      });
    }
  </script>
</body>
</html>
